<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card page-card">
                <div class="card-body p-4 p-md-5">
                    <h2 class="fw-bold mb-2">Login</h2>
                    <p class="text-muted mb-4">Use one account for both Admin and Parent access.</p>

                    <div class="alert alert-danger" th:if="${param.error}">
                        Invalid email or password.
                    </div>
                    <div class="alert alert-success" th:if="${param.logout}">
                        You have been logged out successfully.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Sign In</button>
                    </form>

                    <div class="mt-4 small text-muted">
                        Default admin login: <strong>admin@school.com</strong> / <strong>admin123</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
