<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${formTitle})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container">
    <div th:replace="~{fragments/layout :: flashMessages}"></div>
    <div class="card page-card">
        <div class="card-body p-4">
            <h2 class="fw-bold mb-4" th:text="${formTitle}">Add Route</h2>
            <form th:action="${formAction}" th:object="${createRouteRequest}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="row g-3">
                    <div class="col-md-12">
                        <label class="form-label">Route Name</label>
                        <input type="text" th:field="*{routeName}" class="form-control">
                        <div class="text-danger small" th:errors="*{routeName}"></div>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label">Pickup Points</label>
                        <textarea th:field="*{pickupPoints}" class="form-control" rows="4" placeholder="Enter pickup points separated by commas"></textarea>
                        <div class="text-danger small" th:errors="*{pickupPoints}"></div>
                    </div>
                </div>
                <div class="mt-4 d-flex gap-2">
                    <button class="btn btn-primary" type="submit" th:text="${formTitle == 'Edit Route' ? 'Update Route' : 'Save Route'}">Save Route</button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/routes}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
