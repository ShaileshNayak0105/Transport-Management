<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Error')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container">
    <div class="card page-card">
        <div class="card-body p-4">
            <h2 class="fw-bold mb-3" th:text="${errorTitle}">Error</h2>
            <p class="mb-2" th:text="${errorMessage}">Something went wrong.</p>
            <p class="text-muted mb-4">
                Request path:
                <span th:text="${path}">/path</span>
            </p>
            <a class="btn btn-primary" th:href="@{/dashboard}">Back to Dashboard</a>
        </div>
    </div>
</div>
</body>
</html>
