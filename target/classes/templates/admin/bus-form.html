<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${formTitle})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container">
    <div th:replace="~{fragments/layout :: flashMessages}"></div>
    <div class="card page-card">
        <div class="card-body p-4">
            <h2 class="fw-bold mb-4" th:text="${formTitle}">Add Bus</h2>
            <form th:action="${formAction}" th:object="${createBusRequest}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Bus Number</label>
                        <input type="text" th:field="*{busNumber}" class="form-control">
                        <div class="text-danger small" th:errors="*{busNumber}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Capacity</label>
                        <input type="number" th:field="*{capacity}" class="form-control" min="1">
                        <div class="text-danger small" th:errors="*{capacity}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Driver</label>
                        <select th:field="*{driverId}" class="form-select">
                            <option value="">Select Driver</option>
                            <option th:each="driver : ${drivers}" th:value="${driver.id}" th:text="${driver.name + ' (' + driver.phone + ')'}"></option>
                        </select>
                        <div class="text-danger small" th:errors="*{driverId}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Route</label>
                        <select th:field="*{routeId}" class="form-select">
                            <option value="">Select Route</option>
                            <option th:each="route : ${routes}" th:value="${route.id}" th:text="${route.routeName}"></option>
                        </select>
                        <div class="text-danger small" th:errors="*{routeId}"></div>
                    </div>
                </div>
                <div class="mt-4 d-flex gap-2">
                    <button class="btn btn-primary" type="submit" th:text="${formTitle == 'Edit Bus' ? 'Update Bus' : 'Save Bus'}">Save Bus</button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/buses}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
