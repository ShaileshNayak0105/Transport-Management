<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Add Parent')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container">
    <div th:replace="~{fragments/layout :: flashMessages}"></div>
    <div class="card page-card">
        <div class="card-body p-4">
            <h2 class="fw-bold mb-4">Add Parent</h2>
            <form th:action="@{/admin/parents/save}" th:object="${createParentRequest}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Full Name</label>
                        <input type="text" th:field="*{name}" class="form-control">
                        <div class="text-danger small" th:errors="*{name}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control">
                        <div class="text-danger small" th:errors="*{email}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Temporary Password</label>
                        <input type="password" th:field="*{password}" class="form-control">
                        <div class="text-danger small" th:errors="*{password}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Linked Student</label>
                        <select th:field="*{studentId}" class="form-select">
                            <option value="">Select Student</option>
                            <option th:each="student : ${students}" th:value="${student.id}" th:text="${student.name + ' - ' + student.className}"></option>
                        </select>
                    </div>
                </div>
                <div class="mt-4 d-flex gap-2">
                    <button class="btn btn-primary" type="submit">Save Parent</button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/parents}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
