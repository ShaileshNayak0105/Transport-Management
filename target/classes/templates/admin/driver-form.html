<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${formTitle})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container">
    <div th:replace="~{fragments/layout :: flashMessages}"></div>
    <div class="card page-card">
        <div class="card-body p-4">
            <h2 class="fw-bold mb-4" th:text="${formTitle}">Add Driver</h2>
            <form th:action="${formAction}" th:object="${createDriverRequest}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Driver Name</label>
                        <input type="text" th:field="*{name}" class="form-control">
                        <div class="text-danger small" th:errors="*{name}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Phone Number</label>
                        <input type="text" th:field="*{phone}" class="form-control">
                        <div class="text-danger small" th:errors="*{phone}"></div>
                    </div>
                </div>
                <div class="mt-4 d-flex gap-2">
                    <button class="btn btn-primary" type="submit" th:text="${formTitle == 'Edit Driver' ? 'Update Driver' : 'Save Driver'}">Save Driver</button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/drivers}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
